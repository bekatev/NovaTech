<div class="app-shell min-h-screen text-slate-100">
  <header class="app-header sticky top-0 z-50 border-b border-slate-700/40 bg-slate-950/65 backdrop-blur-xl">
    <nav class="section-wrap flex items-center justify-between py-4">
      <a routerLink="/" class="text-2xl font-semibold tracking-tight text-white">
        NovaTech <span class="text-cyan-300">Technologies</span>
      </a>
      <ul class="hidden items-center gap-8 text-sm font-medium text-slate-300 md:flex">
        <li *ngFor="let item of navItems">
          <a
            [routerLink]="item.path"
            routerLinkActive="text-white"
            class="cursor-pointer transition hover:text-cyan-300"
          >
            {{ item.label }}
          </a>
        </li>
      </ul>
      <button
        class="theme-toggle btn-secondary inline-flex h-11 w-11 items-center justify-center rounded-full p-0"
        (click)="toggleTheme()"
        [attr.aria-label]="isDarkTheme ? 'Switch to light theme' : 'Switch to dark theme'"
        [attr.title]="isDarkTheme ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        <span class="material-symbols-outlined theme-icon" aria-hidden="true">
          {{ isDarkTheme ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>
      <a routerLink="/contact" class="btn-primary">
        Book Demo
      </a>
    </nav>
  </header>

  <main>
    <router-outlet />
  </main>

  <footer class="app-footer mt-20 border-t border-slate-700/40 bg-slate-950/70">
    <div class="section-wrap py-10">
      <p class="text-sm text-slate-400">Copyright © 2026. All Rights Reserved.</p>
      <p class="mt-2 text-sm text-slate-500">NovaTech Technologies Group AG, Poststrasse 14, 6300, Zug Switzerland</p>
      <div class="mt-4 flex gap-6 text-sm text-slate-400">
        <a class="hover:text-cyan-300" href="#">Cookie Policy</a>
        <a class="hover:text-cyan-300" href="#">Privacy Policy</a>
      </div>
    </div>
  </footer>
</div>
